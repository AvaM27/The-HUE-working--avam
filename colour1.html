<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colour 1</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/inspo.css">
</head>
<body>

     

  <div id="main-nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>

  <div id="main-colour-section">
    <div class="main-swatch">
      <div class="colour-block main-colour"></div>
      <p class="hex main-hex">[ #6b2c43 ]</p>
    </div>
  </div>

  <p class="intro-text">Selected palette</p>

  <div id="palette-section">

    
    <div class="colour-swatch c1-1">
      <div class="colour-block c1-1-block"></div>
      <p class="hex">[ #ef742e ]</p>
    </div>

    <div class="colour-swatch c1-2">
      <div class="colour-block c1-2-block"></div>
      <p class="hex">[ #a39b1f ]</p>
    </div>

    <div class="colour-swatch c1-3">
      <div class="colour-block c1-3-block"></div>
      <p class="hex">[ #f4e49b ]</p>
    </div>

  </div>

  <!-- POP UP C1 -->

<div id="popup">
  <div class="popup-content">
    <div id="close-popup">×</div>

    <div class="popup-swatches">
      <div id="popup-main-colour" class="popup-colour"></div>
      <div class="popup-plus">+</div>
      <div id="popup-palette-colour" class="popup-colour"></div>
  </div>

<h2 id="popup-title"></h2>
<p id="popup-hex"></p>
<p id="popup-description"></p>



  <div class="inspo-grid">
  <img id="inspo-img-1" src="images/c1-1.jpg" alt="">
  <img id="inspo-img-2" src="images/c1-2.jpg" alt="">
  <img id="inspo-img-3" src="images/c1-3.jpg" alt="">
  <img id="inspo-img-4" src="images/c1-4.jpg" alt="">
  <img id="inspo-img-5" src="images/c1-5.jpg" alt="">
  <img id="inspo-img-6" src="images/c1-6.jpg" alt="">
  <img id="inspo-img-7" src="images/c1-7.jpg" alt="">
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="Js/js.js"></script>
</body>
</html>
