
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colour 3</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/Inspo.css">
</head>
<body>

  <div id="main-nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </div>

  <div id="main-colour-section">
    <div class="main-swatch">
      <div class="colour-block main-colour-3"></div>
      <p class="hex main-hex">[ #a09c33 ]</p>
    </div>
  </div>

  <p class="intro-text">Selected palette</p>

  <div id="palette-section">

    <div class="colour-swatch c3-1">
      <div class="colour-block c3-1-block"></div>
      <p class="hex">[ #dee0df ]</p>
    </div>

    <div class="colour-swatch c3-2">
      <div class="colour-block c3-2-block"></div>
      <p class="hex">[ #C7DFFF ]</p>
    </div>

    <div class="colour-swatch c3-3">
      <div class="colour-block c3-3-block"></div>
      <p class="hex">[ #594c1e ]</p>
    </div>

  </div>

  <div id="popup">
    <div class="popup-content">
      <div id="close-popup">×</div>

      <div class="popup-swatches">
        <div id="popup-main-colour" class="popup-colour"></div>
        <div class="popup-plus">+</div>
        <div id="popup-palette-colour" class="popup-colour"></div>
      </div>

      <h2 id="popup-title"></h2>
      <p id="popup-hex"></p>
      <p id="popup-description"></p>

      <div class="inspo-section">
        <div class="inspo-grid">
          <img id="inspo-img-1" src="images/c3-1-1.jpg" alt="">
          <img id="inspo-img-2" src="images/c3-1-2.jpg" alt="">
          <img id="inspo-img-3" src="images/c3-1-3.jpg" alt="">
          <img id="inspo-img-4" src="images/c3-1-4.jpg" alt="">
          <img id="inspo-img-5" src="images/c3-1-5.jpg" alt="">
          <img id="inspo-img-6" src="images/c3-1-6.jpg" alt="">
          <img id="inspo-img-7" src="images/c3-1-7.jpg" alt="">
        </div>
      </div>

    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="Js/js.js"></script>
</body>
</html>
